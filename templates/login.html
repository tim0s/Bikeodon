{% extends "base.html" %}
{% block title %}Log in – Bikeodon{% endblock %}
{% block content %}
<article class="auth-card">
  <hgroup>
    <h2>Log in</h2>
    <p>Welcome back</p>
  </hgroup>
  <form method="post">
    <label>Username
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit" class="contrast">Log in</button>
  </form>
  <p class="center">No account? <a href="{{ url_for('register') }}">Register</a></p>
</article>
{% endblock %}
